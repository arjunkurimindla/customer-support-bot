<!DOCTYPE html>
<html>
<head>
    <title>Customer Support Bot</title>
</head>
<body>

    <h1>Customer Support Bot</h1>

    <input
        type="text"
        id="message"
        placeholder="Type your message"
    >

    <button onclick="sendMessage()">
        Send
    </button>

    <p id="reply"></p>

    <script>

        async function sendMessage() {

            const message =
            document.getElementById("message").value;

            const response =
            await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message
                })
            });

            const data =
            await response.json();

            document.getElementById(
                "reply"
            ).innerText =
            data.reply;
        }

    </script>

</body>
</html>
